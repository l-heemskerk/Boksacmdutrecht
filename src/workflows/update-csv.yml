name: Update CSV Export

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - 'scripts/generate-csv.ts'
  workflow_dispatch:

jobs:
  update-csv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Generate CSV
        run: |
          npm run generate-csv > public/cmd-boksa-overzicht.csv
          
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code public/cmd-boksa-overzicht.csv || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add public/cmd-boksa-overzicht.csv
          git commit -m "🤖 Auto-update CSV export [skip ci]"
          git push
